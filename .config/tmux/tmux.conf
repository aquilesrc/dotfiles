# Reload config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -as terminal-features ',*:RGB'
set-environment -g COLORTERM truecolor

# Vi mode
set-window-option -g mode-keys vi

# Escape delay fix
set -sg escape-time 0

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Scrollback history
set-option -g history-limit 3000

# Prefix
set -g prefix C-s

# Windows
bind l next-window
bind h previous-window
bind n new-window -c "#{pane_current_path}"
bind x kill-window
bind s choose-session

bind-key -n M-l next-window
bind-key -n M-h previous-window
bind-key -n M-n new-window -c "#{pane_current_path}"
bind-key -n M-w kill-window
bind-key -n M-s choose-session
bind-key -n M-N new-session
bind-key -n C-Space copy-mode

bind-key -n M-1 selectw -t 1
bind-key -n M-2 selectw -t 2
bind-key -n M-3 selectw -t 3
bind-key -n M-4 selectw -t 4
bind-key -n M-5 selectw -t 5
bind-key -n M-6 selectw -t 6
bind-key -n M-7 selectw -t 7
bind-key -n M-8 selectw -t 8
bind-key -n M-9 selectw -t 9
bind-key -n M-0 selectw -t 10

# Appearance
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=colour4'
set -g status-left ''
set -g status-right '%d-%m-%Y %H:%M '
set -g status-right-length 50
set -g status-left-length 10

setw -g window-status-current-style 'fg=colour4'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=colour2'
setw -g window-status-format ' #I #[fg=colour7]#W #[fg=colour4]#F '

setw -g window-status-bell-style 'fg=colour0 bg=colour4 bold'
